<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IELTS Reading</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="top-controls">
    <div class="primary-controls">
      <div class="timer-display" id="timerDisplay" aria-live="polite">00:00</div>
      <button class="timer-btn" id="startTimerBtn" type="button">Start timer</button>
      <button class="timer-btn" id="loadDefaultBtn" type="button">Load default files</button>
    </div>

    <div class="upload-controls" aria-label="Upload content">
      <label class="upload-field" for="passageFileInput">
        <span>Passage file</span>
        <input id="passageFileInput" type="file" accept=".md,.txt,text/markdown,text/plain" />
      </label>
      <label class="upload-field" for="questionsFileInput">
        <span>Questions file</span>
        <input id="questionsFileInput" type="file" accept=".md,.txt,text/markdown,text/plain" />
      </label>
      <button class="timer-btn upload-btn" id="uploadFilesBtn" type="button">Upload files to cloud</button>
    </div>

    <div class="paste-controls" aria-label="Paste content fallback">
      <label class="paste-field" for="passagePasteInput">
        <span>Paste passage text</span>
        <textarea id="passagePasteInput" rows="4" placeholder="Paste passage markdown here..."></textarea>
      </label>
      <label class="paste-field" for="questionsPasteInput">
        <span>Paste questions text</span>
        <textarea id="questionsPasteInput" rows="4" placeholder="Paste questions markdown here..."></textarea>
      </label>
      <button class="timer-btn upload-btn" id="uploadPasteBtn" type="button">Upload pasted content</button>
    </div>
  </div>

  <aside class="tests-column" id="testsColumn" aria-label="Uploaded tests">
    <div class="tests-header">
      <h2 class="tests-title">Uploaded Tests</h2>
      <button class="timer-btn tests-refresh-btn" id="refreshTestsBtn" type="button">Refresh</button>
    </div>
    <div class="tests-list" id="testsList">
      <div class="tests-empty" id="testsEmptyMsg">No uploaded tests yet.</div>
    </div>
  </aside>

  <div class="container">
    <div class="left">
      <h1 class="panel-title">Reading Passage</h1>
      <div id="passageContent" class="mono-content">Loading passage...</div>
    </div>

    <div class="resizer" id="columnResizer" role="separator" aria-label="Resize columns" aria-orientation="vertical"></div>

    <div class="right">
      <h1 class="panel-title">Questions</h1>
      <div id="questionsContent" class="mono-content">Loading questions...</div>
      <div class="status" id="statusMsg"></div>
    </div>
  </div>

  <div class="selection-tools" id="selectionTools" aria-hidden="true">
    <div class="color-picker" aria-label="Highlight colors">
      <button class="swatch active" type="button" data-color="yellow" data-value="#fff59a" aria-label="Yellow"></button>
      <button class="swatch" type="button" data-color="green" data-value="#b7f3c4" aria-label="Green"></button>
      <button class="swatch" type="button" data-color="orange" data-value="#ffd4a1" aria-label="Orange"></button>
      <button class="swatch" type="button" data-color="pink" data-value="#ffc2de" aria-label="Pink"></button>
      <button class="swatch" type="button" data-color="light-purple" data-value="#e4d3ff" aria-label="Light purple"></button>
    </div>
    <button class="tool-btn" id="highlightBtn" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h5l10-10-5-5L4 15v5zm12.71-11.29a1.004 1.004 0 0 0 0-1.42l-1.99-1.99a1.004 1.004 0 0 0-1.42 0l-1.3 1.3 5.41 5.41 1.3-1.29z"/></svg>
      <span>Highlight</span>
    </button>
    <button class="tool-btn" id="clearSelectedBtn" type="button" style="display:none;">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 6h10l1 2h4v2H2V8h4l1-2zm2 6h2v7H9v-7zm4 0h2v7h-2v-7z"/></svg>
      <span>Clear selected</span>
    </button>
    <button class="tool-btn" id="clearHighlightBtn" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1z"/></svg>
      <span>Clear all</span>
    </button>
  </div>

  <footer class="app-footer" aria-label="Application footer">
    <div class="app-footer-inner">
      <p class="app-footer-title">IELTS Reading Practice Workspace</p>
      <p class="app-footer-meta">Cloud-enabled passage uploads, test history, and focused reading mode.</p>
    </div>
  </footer>

</body>
